name: Build ASI Patch

on: [push, pull_request]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive # Important if MinHook is a submodule

      - name: Setup Premake
        uses: abel0b/setup-premake@v2.4
        with:
          version: "5.0.0-beta2"

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Generate Project Files
        run: premake5 vs2022
        
      - name: List Files (Debug)
        run: dir

      - name: Build Patch (Release x86)
        run: |
          msbuild build/AGDressDesignerPatch.sln `
            -property:Configuration=Release `
            -property:Platform=x86 `
            -t:Rebuild

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AGDressDesigner-Patch
          path: bin/Release/*.asi # Adjust this path based on where Premake spits out the file
